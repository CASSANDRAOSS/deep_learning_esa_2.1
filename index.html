<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TFJS Regression Projekt</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

    <div class="header-section">
        <h1>Nichtlineare Regression mit TensorFlow.js</h1>
        <div class="avatar-container">
            <img src="4.png" alt="Avatar" class="avatar">
        </div>
        <div class="nav-buttons">
            <button onclick="showSection('section-intro')">Einführung</button>
            <button onclick="showSection('section-params')">Parameter</button>
            <button onclick="showSection('section-models')">Modelle & Visualisierungen</button>
            <button onclick="showSection('section-discussion')">Diskussion</button>
            <button onclick="showSection('section-docu')">Dokumentation</button>
        </div>
    </div>

    <div id="section-models" class="content-section" style="display:none;">
        <div class="accordion">

            <div class="accordion-item">
                <button class="accordion-header">
                    <span>A1 & R1 – Datengenerierung</span>
                    <span class="arrow">▸</span>
                </button>
                <div class="accordion-content">
                    <div id="loader-a1" class="loading">Erzeuge Daten...</div>
                    <div class="plot-row">
                        <div id="plot-clean" class="plot"></div>
                        <div id="plot-noisy" class="plot"></div>
                    </div>
                </div>
            </div>

            <div class="accordion-item">
                <button class="accordion-header">
                    <span>A2 & R2 – Modell ohne Rauschen (Clean)</span>
                    <span class="arrow">▸</span>
                </button>
                <div class="accordion-content">
                    <div id="loader-clean" class="loading">KI wird trainiert...</div>
                    <div class="plot-row">
                        <div id="plot-clean-train" class="plot"></div>
                        <div id="plot-clean-test" class="plot"></div>
                    </div>
                    <div id="loss-clean"></div>
                </div>
            </div>

            <div class="accordion-item">
                <button class="accordion-header">
                    <span>A3 & R3 – Best-Fit Modell (Rauschen)</span>
                    <span class="arrow">▸</span>
                </button>
                <div class="accordion-content">
                    <div id="loader-best" class="loading">KI wird trainiert (Best-Fit)...</div>
                    <div class="plot-row">
                        <div id="plot-best-train" class="plot"></div>
                        <div id="plot-best-test" class="plot"></div>
                    </div>
                    <div id="loss-best"></div>
                </div>
            </div>

            <div class="accordion-item">
                <button class="accordion-header">
                    <span>A4 & R4 – Overfit Modell (1500 Epochen)</span>
                    <span class="arrow">▸</span>
                </button>
                <div class="accordion-content">
                    <div id="loader-overfit" class="loading">KI wird trainiert (das dauert kurz)...</div>
                    <div class="plot-row">
                        <div id="plot-overfit-train" class="plot"></div>
                        <div id="plot-overfit-test" class="plot"></div>
                    </div>
                    <div id="loss-overfit"></div>
                </div>
            </div>

        </div>
    </div>

    <div id="section-intro" class="content-section" style="display:none;">
        <div class="content-box"><p>Willkommen! Hier erfährst du, wie neuronale Netze lernen...</p></div>
    </div>
    
    <div id="section-params" class="content-section" style="display:none;">
        <div class="content-box"><ul><li>Schichten: 2</li><li>Neuronen: 100 pro Schicht</li></ul></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
