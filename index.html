<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TFJS Regression</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

    <div class="header-section">
        <h1>Nichtlineare Regression mit TensorFlow.js</h1>
        <div class="avatar-container">
            <img src="4.png" alt="Avatar" class="avatar">
        </div>

        <div class="nav-buttons">
            <button onclick="showSection('section-intro')">Einführung</button>
            <button onclick="showSection('section-params')">Parameter</button>
            <button onclick="showSection('section-models')">Modelle</button>
            <button onclick="showSection('section-discussion')">Diskussion</button>
            <button onclick="showSection('section-docu')">Dokumentation</button>
        </div>
    </div>

    <div id="section-models" class="content-section" style="display:none;">
        <div class="accordion">

            <div class="accordion-item">
                <button class="accordion-header"><span>A1 – Datengenerierung</span><span class="arrow">▸</span></button>
                <div class="accordion-content">
                    <div id="loader-a1" class="loading">Daten werden generiert...</div>
                    <div class="plot-row">
                        <div id="plot-clean" class="plot"></div>
                        <div id="plot-noisy" class="plot"></div>
                    </div>
                </div>
            </div>

            <div class="accordion-item">
                <button class="accordion-header"><span>A2 – Modell ohne Rauschen</span><span class="arrow">▸</span></button>
                <div class="accordion-content">
                    <div id="loader-clean" class="loading">KI trainiert (Clean)...</div>
                    <h3>Vergleich: Training vs. Test</h3>
                    <div class="plot-row">
                        <div id="plot-clean-train" class="plot"></div>
                        <div id="plot-clean-test" class="plot"></div>
                    </div>
                    <div id="loss-clean"></div>
                </div>
            </div>

            <div class="accordion-item">
                <button class="accordion-header"><span>A3 – Best-Fit Modell (Rauschen)</span><span class="arrow">▸</span></button>
                <div class="accordion-content">
                    <div id="loader-best" class="loading">KI trainiert (Best-Fit)...</div>
                    <h3>Vergleich: Training vs. Test</h3>
                    <div class="plot-row">
                        <div id="plot-best-train" class="plot"></div>
                        <div id="plot-best-test" class="plot"></div>
                    </div>
                    <div id="loss-best"></div>
                </div>
            </div>

            <div class="accordion-item">
                <button class="accordion-header"><span>A4 – Overfit Modell</span><span class="arrow">▸</span></button>
                <div class="accordion-content">
                    <div id="loader-overfit" class="loading">KI trainiert (Overfit - 1500 Epochen)...</div>
                    <h3>Vergleich: Training vs. Test</h3>
                    <div class="plot-row">
                        <div id="plot-overfit-train" class="plot"></div>
                        <div id="plot-overfit-test" class="plot"></div>
                    </div>
                    <div id="loss-overfit"></div>
                </div>
            </div>

        </div>
    </div>

    <div id="section-intro" class="content-section" style="display:none;">
        <div class="content-box">
            <p>Hier steht dein Einführungstext...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
